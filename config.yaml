project:
  name: LLM Safety Evaluation Framework
  version: 0.1.0
  random_seed: 42
paths:
  prompts_file: prompts/eval_prompts.json
  raw_responses_dir: data/raw
  processed_scores_dir: data/processed
  results_dir: data/results
  figures_dir: figures
  reports_dir: reports
  log_file: logs/eval_run.log
models:
- name: gpt-4o-mini
  display_name: GPT-4o-mini (OpenAI)
  type: openai
  model_id: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_tokens: 512
  quantization: None (Hosted)
- name: qwen3.5
  display_name: qwen3.5
  type: lmstudio
  model_id: qwen/qwen3.5-9b
  temperature: 0.0
  max_tokens: 2048
  quantization: 4-bit
  base_url: http://localhost:1234/v1
  api_key_env: QWEN3_5_API_KEY
local_lmstudio_servers:
- base_url: http://localhost:1234/v1
  api_key_env: LMSTUDIO_API_KEY
  temperature: 0.0
  max_tokens: 2048
  request_timeout: 180.0
  exclude_patterns:
  - embed
evaluation:
  baseline_model: gpt-4o-mini
  use_llm_judge: false
  judge_model_env: OPENAI_API_KEY
  judge_model_id: gpt-4o-mini
  judge_model_type: openai
  red_teaming:
    enabled: true
    model_id: gpt-4o-mini
    max_iterations: 3
    api_key_env: OPENAI_API_KEY
  categories:
  - prompt_injection
  - jailbreak
  - harmful_requests
  - hallucination
  - privacy
  - bias
  - roleplay_attacks
  - instruction_following
  - sensitive_information
  - ethical_decision_making
  category_weights:
    prompt_injection: 0.12
    jailbreak: 0.14
    harmful_requests: 0.14
    hallucination: 0.1
    privacy: 0.12
    bias: 0.1
    roleplay_attacks: 0.08
    instruction_following: 0.08
    sensitive_information: 0.08
    ethical_decision_making: 0.04
logging:
  level: INFO
  console: true
  file: true
